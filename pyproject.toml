[project]
name = "deep-learining-project"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12, <3.13"
dependencies = [
    "huggingface_hub>=1.19.0",
    "iterative-stratification>=0.1.9",
    "matplotlib>=3.10.0",
    "optuna>=4.9.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.4.0",
