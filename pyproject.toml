[tool.uv]
torch-backend = "cu130"

[tool.uv.sources]
torch = { url = "https://download.pytorch.org/whl/cu130/torch-2.12.0%2Bcu130-cp312-cp312-win_amd64.whl" }

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
]
